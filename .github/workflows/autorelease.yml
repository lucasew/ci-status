name: Autorelease

on:
  push:
    branches:
    - main
    tags:
    - '*'
  pull_request:
    branches:
    - main
  workflow_dispatch:
    inputs:
      new_version:
        description: 'New tag version'
        type: choice
        default: 'patch'
        options:
        - patch
        - minor
        - major
  schedule:
  - cron: '0 2 * * 6'   # saturday 2am

jobs:
  autorelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      pull-requests: write
      statuses: write
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      with:
        fetch-depth: 0 # Important for versioning/tags

    - name: Setup git config
      run: |
        git config user.name actions-bot
        git config user.email actions-bot@users.noreply.github.com

    - uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5 # v3

    - name: Install
      run: mise run install

    - name: Codegen
      run: mise run codegen

    - name: Create Pull Request if there is new stuff from updaters
      if: github.event_name != 'pull_request'
      uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8
      id: pr_create
      with:
        commit-message: Updater script changes
        branch: updater-bot
        delete-branch: true
        title: "Updater: stuff changed"
        body: |
          Changes caused from update scripts

    - name: Stop if a pull request was created
      if: github.event_name != 'pull_request'
      env:
        PR_NUMBER: ${{ steps.pr_create.outputs.pull-request-number }}
      run: |
        if [[ ! -z "$PR_NUMBER" ]]; then
          echo "The update scripts changed something and a PR was created. Giving up deploy." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: CI
      run: mise run ci

    - name: Bump version and tag
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.new_version != ''
      env:
        NEW_VERSION: ${{ github.event.inputs.new_version }}
      run: |
        git checkout main
        # Run make_release logic but ensure we handle the push correctly or let the next workflow run handle it
        # Original make_release pushes. If we push here, we might stop this run (which is fine, the tag triggers the release run)
        NO_TAG=1 ./make_release "$NEW_VERSION"
        # make_release does git push. If successful, new tag is pushed?
        # make_release script: if NO_TAG is set, it skips tagging but pushes commits?
        # Let's look at make_release again in memory.
        # It updates version.txt, commits.
        # if NO_TAG is NOT set, it tags and pushes tag.
        # if NO_TAG IS set, it skips tag/push-tag, but does `git push`.
        # The original workflow ran with NO_TAG=1. So it pushed the commit but not the tag.
        # Then it echoed RELEASE_VERSION.
        # Then it created release using RELEASE_VERSION as tag.
        # So the tag is created by `gh release create` later.
        # This means the commit is pushed, but the tag is NOT yet on remote until `gh release create`.
        # This flow is slightly unusual but I will preserve it.
        echo "RELEASE_VERSION=$(cat version.txt)" >> $GITHUB_ENV

    - name: Set Release Version from Tag
      if: startsWith(github.ref, 'refs/tags/')
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Build Release Artifacts
      if: env.RELEASE_VERSION != ''
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
         ./scripts/build_release.sh

    - name: Create release
      if: env.RELEASE_VERSION != '' && github.event_name != 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ env.RELEASE_VERSION }}
        TITLE: Release ${{ env.RELEASE_VERSION }}
      run: |
        gh release create "$TAG" \
          --title "$TITLE" \
          --generate-notes || true
        # || true in case release already exists (e.g. if triggered by tag)

    - name: Upload release artifacts
      if: env.RELEASE_VERSION != '' && github.event_name != 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ env.RELEASE_VERSION }}
      run: |
        gh release upload "$TAG" build/* --clobber
